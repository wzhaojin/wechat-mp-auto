name: 默认主题

colors:
  primary: "#007AFF"
  secondary: "#5856D6"
  text: "#333333"
  background: "#f0f4ff"

body:
  font_size: "15px"
  line_height: "1.8"

h1:
  font_size: "22px"
  text_align: "center"
  margin: "20px 0"

