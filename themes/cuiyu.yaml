name: 翠玉 cuiyu

colors:
  primary: "#1EA089"
  secondary: "#FDB22F"
  text: "#777777"
  background: "#FFFFFF"
  code_bg: "#282c34"

body:
  font_size: "16px"
  line_height: "1.8"
  letter_spacing: "0.5px"

h1:
  font_size: "24px"
  text_align: "center"
  margin: "20px 0"
  color: "#1A1A1A"

h2:
  font_size: "22px"
  font_weight: "bold"
  color: "white"
  background_color: "#1EA089"
  border_left: "10px solid #FDB22F"
  padding: "3px 10px"
  margin: "24px 0 16px"

h3:
  font_size: "18px"
  font_weight: "bold"
  color: "#1EA089"
  border_bottom: "2px solid #FDB22F"
  padding: "6px"
  margin: "20px 0 12px"

p:
  margin: "14px 0"
  color: "#777777"

link:
  color: "#1E6BB8"
  text_decoration: "none"

blockquote:
  color: "#777777"
  background_color: "#f7f7f7"
  border_left: "4px solid #1EA089"
  padding: "12px 16px"
  margin: "16px 0"

ul:
  margin: "12px 0"
  padding_left: "24px"
  bullet_color: "#1EA089"

ol:
  margin: "12px 0"
  padding_left: "24px"
  number_color: "#1EA089"

strong:
  color: "#1EA089"
  font_weight: "bold"

em:
  color: "#FDB22F"
  font_style: "normal"
