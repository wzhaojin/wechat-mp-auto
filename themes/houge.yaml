# 猴哥风格模板
# 参考猴哥公众号文章样式

name: 猴哥风格

colors:
  primary: "#1a1a2e"
  secondary: "#ff6b00"
  text: "#333333"
  background: "#fafafa"
  accent: "#ff6b00"

body:
  font_size: "16px"
  line_height: "1.8"

h1:
  font_size: "24px"
  font_weight: "bold"
  text_align: center
  color: "#1a1a2e"
  margin: "20px 0"

h2:
  font_size: "18px"
  font_weight: "bold"
  color: "#1a1a2e"
  margin: "16px 0"

h3:
  font_size: "16px"
  font_weight: "bold"
  color: "#333333"
  margin: "12px 0"

p:
  margin: "12px 0"

link:
  color: "#1a1a2e"
  text_decoration: "underline"

blockquote:
  border_left: "4px solid #ff6b00"
  background_color: "#fff8f0"
  padding: "12px 16px"
  color: "#666666"
  margin: "16px 0"
